<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Required for mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="register.css">
</head>
<body class="bg-light">

  <div class="container min-vh-100 d-flex align-items-center justify-content-center px-3">
    <div class="card shadow rounded-4 w-100" style="max-width: 420px;">

      <div class="card-body p-4 p-sm-5">
        <h3 class="fw-bold mb-2 text-center text-sm-start">Register</h3>
        <p class="text-muted mb-4 text-center text-sm-start">
          Signup now and get full access to our app.
        </p>

        <form>
          
          <div class="row g-2 mb-3">
            <div class="col-12 col-sm-6">
              <input type="text" class="form-control" placeholder="First name" required>
            </div>
            <div class="col-12 col-sm-6">
              <input type="text" class="form-control" placeholder="Last name" required>
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email" required>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <input type="password" class="form-control" placeholder="Password" required>
          </div>

          <!-- Confirm Password -->
          <div class="mb-4">
            <input type="password" class="form-control" placeholder="Confirm password" required>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            Submit
          </button>

          <!-- Sign in -->
          <p class="text-center mt-3 mb-0 small">
            Did you remember your account?
            <a href="index.html" class="text-decoration-none">Sign in</a>
          </p>
        </form>
      </div>

    </div>
  </div>

</body>
</html>
